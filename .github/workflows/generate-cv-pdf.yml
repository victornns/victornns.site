name: Generate CV PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-cv-pdf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip pdf]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate curriculo PDF
        run: npm run generate:cv-pdf

      - name: Commit updated PDF
        run: |
          if git diff --quiet public/pdf/victor-nascimento-cv.pdf; then
            echo "PDF não foi alterado. Nenhum commit necessário."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/pdf/victor-nascimento-cv.pdf
            git commit -m "chore: update curriculo pdf [skip pdf]"
            git pull --rebase origin main
            git push
          fi

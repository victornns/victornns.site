name: Generate CV PDF

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: generate-cv-pdf-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-pdf:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip pdf]')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Sync latest branch
        run: git pull --rebase origin main

      - name: Generate curriculo PDF
        run: npm run generate:cv-pdf

      - name: Verify generated PDF
        run: test -f public/pdf/victor-nascimento-cv.pdf

      - name: Commit updated PDF
        run: |
          git add public/pdf/victor-nascimento-cv.pdf

          if git diff --cached --quiet -- public/pdf/victor-nascimento-cv.pdf; then
            echo "PDF não foi alterado. Nenhum commit necessário."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: update curriculo pdf [skip pdf]"
            git push
          fi